name: YouTube Daily Top 5 Scan

on:
  schedule:
    - cron: '0 12 * * *'   # 7h tối Vietnam (UTC+7 = 12:00 UTC)
  workflow_dispatch:         # Cho phép chạy thủ công bất kỳ lúc nào

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Cần để commit data.json vào repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run YouTube scanner
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SCAN_DAYS: '7'
        run: node scan.js

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update top5 data $(date +'%Y-%m-%d %H:%M') UTC"
          git push
